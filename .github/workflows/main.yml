on:
  push:
    branches:
    - main
jobs:
  archive:
    name: make tar archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compute epoch timestamp
        run: echo "tag=${EPOCHSECONDS}" >> $GITHUB_ENV
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
